name: ssh_key_manager
description: A professional SSH key management tool for Windows desktop.
version: 1.0.0

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  path_provider: ^2.1.2
  file_picker: ^6.1.1
  clipboard: ^0.1.3
  crypto: ^3.0.3
  pointycastle: ^3.7.3
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  provider: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
